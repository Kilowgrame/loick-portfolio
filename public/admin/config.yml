# =====================================================
# Decap CMS configuration
# Maps your "projets" content collection to a visual admin UI
# =====================================================

# Backend: GitHub OAuth (uses Netlify as the OAuth broker via its API).
# Requires:
#  - A GitHub OAuth App registered with callback URL https://api.netlify.com/auth/done
#  - The OAuth provider installed on this Netlify site with the App's Client ID + Secret
backend:
  name: github
  repo: Kilowgrame/loick-portfolio       # ← FORMAT: <github-username>/<repo-name>
  branch: main
  base_url: https://api.netlify.com            # uses Netlify as the OAuth proxy
  auth_endpoint: auth                          # default for Netlify OAuth flow

# Media: where uploaded images/videos are stored in the repo
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Site URL (for the preview pane and login redirects)
site_url: https://loick-legallais.netlify.app
display_url: https://loick-legallais.netlify.app
logo_url: https://loick-legallais.netlify.app/favicon.svg

# Locale of the admin UI
locale: 'fr'

# =====================================================
# Collections — the data types you can manage
# =====================================================
collections:

  # -----------------------------------------------------
  # PROJETS — your portfolio projects
  # -----------------------------------------------------
  - name: "projets"
    label: "Projets"
    label_singular: "Projet"
    folder: "src/content/projets"
    create: true            # allow creating new projects
    delete: true            # allow deleting projects
    slug: "{{slug}}"        # filename comes from "slug" field below
    extension: "md"
    format: "frontmatter"   # YAML frontmatter + body
    summary: "{{title}} — {{year}}"
    sortable_fields: ['order', 'title']
    view_groups:
      - label: "Par catégorie"
        field: category
    fields:

      # ============ CARD INFO ============
      - { label: "Titre", name: "title", widget: "string" }

      - label: "Slug (URL)"
        name: "slug"
        widget: "string"
        hint: "L'URL du projet, ex: 'sbg-systems' donnera /projets/sbg-systems. Utilise des tirets, pas d'accent, pas d'espace."

      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Phrase d'accroche affichée sur la home (bloc damier) et le sidebar de la single."

      - label: "Image de couverture"
        name: "cover"
        widget: "image"
        required: false
        hint: "Image affichée sur la card de l'archive."

      - label: "Texte alternatif (cover)"
        name: "coverAlt"
        widget: "string"
        required: false

      - label: "Couleur de fond (bloc home)"
        name: "bgColor"
        widget: "color"
        default: "#06535e"
        allowInput: true

      - label: "Couleur du texte (bloc home)"
        name: "textColor"
        widget: "color"
        default: "#ffffff"
        allowInput: true

      - label: "Champs d'intervention"
        name: "fields"
        widget: "list"
        default: ["UI Design", "UX Design"]
        hint: "Ex: UI Design, UX Design, Branding... Affiché sur la card et le sidebar."

      - label: "Catégorie principale"
        name: "category"
        widget: "select"
        options: ["Product Design", "UI / UX Design", "Branding"]
        required: false
        hint: "Sert pour le filtre de l'archive."

      - label: "Ordre d'affichage"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
        hint: "1 = premier, 2 = deuxième, etc. Les projets sont triés par cet ordre."

      - label: "Brouillon (masqué du site)"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Si activé, le projet est invisible sur le site mais reste sauvegardé."

      # ============ SINGLE PAGE — SIDEBAR ============
      - label: "Lien externe (Voir le site)"
        name: "liveUrl"
        widget: "string"
        required: false
        pattern: ['^https?://', "Doit commencer par http:// ou https://"]
        hint: "URL du projet en ligne (optionnel). Affichera un bouton 'Voir le site'."

      - label: "Méta-informations (sidebar)"
        name: "metaItems"
        widget: "list"
        required: false
        summary: "{{fields.label}} : {{fields.value}}"
        hint: "Lignes avec séparateurs dans le sidebar de la single. Ajoute Année, Secteurs, Client, Durée, etc."
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Valeur", name: "value", widget: "string" }

      - label: "Afficher les stats à la fin"
        name: "showStats"
        widget: "boolean"
        default: true
        hint: "Affiche les 3 stats (7 ans / +50 clients / +120h) en bas de la single."

      # ============ SINGLE PAGE — BLOCS ============
      - label: "Blocs de contenu"
        name: "blocs"
        widget: "list"
        required: false
        summary: "{{fields.type}}"
        hint: "Ajoute, réorganise, supprime librement les blocs. Glisse-dépose pour réordonner."
        types:

          - label: "Texte"
            name: "text"
            widget: "object"
            fields:
              - { label: "Contenu", name: "contenu", widget: "text" }

          - label: "Image"
            name: "image"
            widget: "object"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Texte alternatif", name: "alt", widget: "string", required: false }
              - { label: "Légende", name: "legende", widget: "string", required: false }

          - label: "Vidéo (.webm)"
            name: "video"
            widget: "object"
            fields:
              - label: "Fichier vidéo"
                name: "src"
                widget: "file"
                hint: "Upload un fichier .webm"
              - label: "Image poster (avant lecture)"
                name: "poster"
                widget: "image"
                required: false
              - { label: "Autoplay", name: "autoplay", widget: "boolean", default: true }
              - { label: "Loop (en boucle)", name: "loop", widget: "boolean", default: true }
              - { label: "Muet", name: "muted", widget: "boolean", default: true }

          - label: "GIF animé"
            name: "gif"
            widget: "object"
            fields:
              - { label: "Fichier GIF", name: "src", widget: "image" }
              - { label: "Texte alternatif", name: "alt", widget: "string", required: false }

          - label: "Galerie d'images"
            name: "galerie"
            widget: "object"
            fields:
              - label: "Nombre de colonnes"
                name: "colonnes"
                widget: "number"
                default: 2
                min: 1
                max: 4
                value_type: "int"
              - label: "Images"
                name: "images"
                widget: "list"
                summary: "{{fields.alt}}"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Texte alternatif", name: "alt", widget: "string", required: false }

      # ============ BODY ============
      - label: "Notes internes (non affiché)"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Zone libre pour notes / aide-mémoire. Non affichée sur le site."
